<!-- para despues de la consulta salgan los atletas -->
<html>
    <head>
        <title>Listado</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">  
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
        <link rel="stylesheet" href="../css/style.css" type="text/css"/>

    </head>
    <body>
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold text-institucional"> Listado de triatletas</h2>
                    <p class="text-muted"> Consulta y gestiona los deportitas inscritos en el triathlon</p>
                </div>
                <div class="btn-group shadow-sm">
                    <button class="btn btn-outline-primary active" id="vista-table-btn">
                        <i class="bi bi table"></i> Tabla
                    </button>
                    <button class="btn btn-outline-primary" id="vista-cards-btn">
                        <i class="bi bi-grid-3x3-gap"></i>Tarjetas
                    </button>
                </div>
            </div>
            <div id="vista-tabla" class="card shadow-sm border-0">
                <div class="table-responsive shadow-sm rounded">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-institucional text-white">
                            <tr>
                                <th>Foto</th>
                                <th>Identificación</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Especialidad</th>
                                <th>Acciones</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-atletas-body">
                        </tbody>
                    </table>
                </div>
            </div>
            <div id="vista-tarjetas" class="row g-4 d-none">
            </div>
        </div>
    </body>
</html>
