<html>
    <head>
        <title>Eliminacion</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">  
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="container">
            <div id="contenedor-eliminar" class="card shadow-sm border-danger d-none mt-4">
                <div class="card-header bg-danger text-white fw-bold"> 
                    ¡Eliminar Registro!
                </div>
                <div class="card-body text-center">
                    <div class="alert alert-danger d-inline-block w-100">
                        <h5 class="fw-bold">Esta seguro de eliminar a este atleta?</h5>
                        <p class="mb-0">Esta accion es irreversible</p>
                    </div>
                    <div class="mt-3 p-3 bg-light border rounded">
                        <p class="mb-1"><strong>Atleta a eliminar:</strong><span id="eliminar-nombre-texto" class="text-danger fw-bold">---</span></p>
                        <p class="mb-0"><strong>ID:</strong><span id="eliminar-id-texto">---</span></p>
                    </div>
                    <div class="mt-4">
                        <button type="button" class="btn btn-secondary me-3" onclick="ocultarSecciones()">Cancelar</button>
                        <button type="button" id="btn-confirmar-borrado" class="btn btn-danger px-5 fw-bold"> Eliminar Atleta</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
