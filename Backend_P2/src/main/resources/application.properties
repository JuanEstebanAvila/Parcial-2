spring.application.name=TriatlonBackend

# =============================================
# MYSQL - Conexi\u00f3n con XAMPP
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/triatlon_db
spring.datasource.username=root
spring.datasource.password=

# DRIVER
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SERVER
server.port=8080

# =============================================
# ARCHIVOS - Subida de fotos
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
upload.dir=uploads/fotos

# =============================================
# CORREO - Gmail SMTP
# OJO: Reemplaza con tu correo y contrase\u00f1a de aplicaci\u00f3n
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tucorreo@gmail.com
spring.mail.password=tu_contrasena_de_aplicacion
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

